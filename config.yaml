listen: "127.0.0.1:8081"
upstream: "https://api.deepseek.com/anthropic"
metric_prefix: "llm_interceptor."

log:
  request_body: false
  response_body: false

storage:
  #type: sqlite
  #sqlite:
  #  path: "~/.llm-interceptor/data.db"
  type: postgres
  postgres:
    connection_string: "postgres://llmproxy:llmproxy@localhost:5432/llmproxy?sslmode=disable"

state_store:
  #type: memory
  type: redis
  redis:
    url: "redis://:mypassword@localhost:6379/0"

plugins:
  otel-exporter:
    enabled: false
    endpoint: "localhost:4318"
    headers: {}
    max_attr_len: 65535
  cost-tracker:
    enabled: true
  budget:
    max_cost_per_session: 0.01
    max_cost_per_day: 0.02
  rate-limit:
    requests_per_minute: 50
    tokens_per_minute: 100000
  tool-policy:
    blocked_tools: ["computer", "bash"]
    allowed_tools: []
