listen: "127.0.0.1:8080"
upstream: "https://api.anthropic.com"
metric_prefix: "llm_proxy."
shutdown_timeout_sec: 10

admin:
  username: ""
  password: ""
  jwt_secret: ""

log:
  format: json
  level: info
  output: stdout
  request_body: false
  response_body: false

storage:
  type: sqlite
  sqlite:
    path: "~/.llm-interceptor/data.db"
  #type: postgres
  #postgres:
  #  connection_string: "postgres://llmproxy:llmproxy@localhost:5432/llmproxy?sslmode=disable"
  compression:
    enabled: true
    algorithm: gzip
    min_size: 1024

state_store:
  type: memory
  #type: redis
  #redis:
  #  url: "redis://:mypassword@localhost:6379/0"

plugins:
  otel-exporter:
    enabled: false
    endpoint: "localhost:4318"
    headers: {}
    max_attr_len: 65535
  cost-tracker:
    enabled: true
  budget:
    max_cost_per_session: 0.50
    max_cost_per_day: 0
  rate-limit:
    requests_per_minute: 60
    tokens_per_minute: 0
  tool-policy:
    blocked_tools: []
    allowed_tools: []

# Router mode: when enabled, the gateway manages API keys (sk-lli-* prefix)
# and routes requests to different LLM providers based on model name patterns.
# Disabled by default — the gateway operates in passthrough mode.
router:
  enabled: false
  providers:
    - name: anthropic
      base_url: "https://api.anthropic.com"
      model_glob: "claude-*"
      api_key: "${ANTHROPIC_API_KEY}"
    - name: openai
      base_url: "https://api.openai.com"
      model_glob: "gpt-*"
      api_key: "${OPENAI_API_KEY}"

