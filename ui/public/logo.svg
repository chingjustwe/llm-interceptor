<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="LLM Interceptor">
  <!-- Gate/barrier -->
  <rect x="28" y="6" width="4" height="36" rx="2" fill="#22C55E"/>
  <!-- Incoming arrow (intercepted) -->
  <path d="M6 24 L24 24" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  <path d="M18 18 L24 24 L18 30" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  <!-- Neural nodes on gate -->
  <circle cx="30" cy="14" r="3" fill="#22C55E"/>
  <circle cx="30" cy="34" r="3" fill="#22C55E"/>
  <!-- Intercepted signal refraction -->
  <path d="M36 20 L42 18" stroke="#22C55E" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M36 28 L42 30" stroke="#22C55E" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
